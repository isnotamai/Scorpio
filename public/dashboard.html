<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Scorpio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<nav class="topbar">
  <div class="topbar-inner">
    <div class="topbar-brand">
      <img class="logo" src="/logo.png" alt="Scorpio">
      <h1>Scorpio</h1>
      <span class="topbar-tag">Dashboard</span>
    </div>
    <div class="topbar-auth">
      <div class="auth-logged-in" style="display:flex">
        <span class="auth-user" id="auth-username"></span>
        <span class="auth-role-badge" id="auth-role-badge"></span>
        <span class="auth-quota" id="auth-quota"></span>
        <a href="/" class="btn btn-sm btn-secondary">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          Tools
        </a>
        <button class="btn btn-sm btn-secondary" id="btn-logout">Logout</button>
      </div>
    </div>
  </div>
</nav>

<div class="app app--wide">
  <div class="tool-body dash-body">
    <div class="dash-layout">

      <!-- ===== Sidebar ===== -->
      <div class="dash-sidebar">

        <div class="dash-profile">
          <div class="dash-avatar" id="dash-avatar">?</div>
          <div class="dash-profile-name" id="dash-profile-name">—</div>
          <span class="auth-role-badge" id="dash-role-badge"></span>
        </div>

        <div class="dash-stats">
          <div class="dash-stat-card">
            <div class="dash-stat-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            </div>
            <div class="dash-stat-info">
              <div class="dash-stat-value" id="dash-stat-files">—</div>
              <div class="dash-stat-label">Files</div>
            </div>
          </div>
          <div class="dash-stat-card">
            <div class="dash-stat-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <div class="dash-stat-info">
              <div class="dash-stat-value" id="dash-stat-keys">—</div>
              <div class="dash-stat-label">API Keys</div>
            </div>
          </div>
          <div class="dash-stat-card">
            <div class="dash-stat-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
            </div>
            <div class="dash-stat-info">
              <div class="dash-stat-value" id="dash-stat-usage">—</div>
              <div class="dash-stat-label">Quota Used</div>
            </div>
          </div>
        </div>

        <div class="dash-section">
          <div class="dash-section-title">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
            <span>Upload Quota</span>
          </div>
          <div class="quota-bar-container">
            <div class="quota-bar">
              <div class="quota-bar-fill" id="dash-quota-fill" style="width:0%"></div>
            </div>
            <div class="quota-text" id="dash-quota-text">— / —</div>
          </div>
        </div>

      </div>

      <!-- ===== Main ===== -->
      <div class="dash-main">

        <div class="dash-section">
          <div class="dash-section-title">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <span>API Keys</span>
            <button class="btn btn-sm btn-primary" id="dash-create-key">+ New Key</button>
          </div>
          <div id="dash-keys-list"></div>
        </div>

        <div class="dash-section">
          <div class="dash-section-title">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <span>Uploaded Files</span>
            <span class="dash-file-count" id="dash-file-count"></span>
          </div>
          <div id="dash-files-list" class="dash-files-grid"></div>
        </div>

      </div>
    </div>

    <!-- Admin Panel -->
    <div id="admin-panel" style="display:none;margin-top:20px">
      <div class="dash-section dash-section--admin">
        <div class="dash-section-title dash-section-title--admin">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>User Management</span>
        </div>
        <div id="admin-users-list"></div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-line"></div>
    <div class="footer-content">
      <span class="footer-brand">SCORPIO</span>
      <span class="footer-dot">&middot;</span>
      <span class="footer-text">SYS.ONLINE</span>
    </div>
  </footer>
</div>

<!-- Create Key Modal -->
<div class="modal-overlay" id="key-create-modal" style="display:none">
  <div class="modal" id="key-create-panel">
    <button class="modal-close" id="key-create-close">&times;</button>
    <h2 class="modal-title">New API Key</h2>
    <div class="field">
      <label for="key-create-label">Label</label>
      <input type="text" id="key-create-label" placeholder="e.g. ShareX, Home PC" maxlength="64" autocomplete="off">
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" id="key-create-submit">Create Key</button>
      <button class="btn btn-secondary" id="key-create-cancel">Cancel</button>
    </div>
    <div class="status" id="key-create-status"></div>
  </div>

  <!-- Created success panel (hidden initially) -->
  <div class="modal" id="key-created-panel" style="display:none">
    <h2 class="modal-title">Key Created</h2>
    <div class="modal-warn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Save this key — it will not be shown again.
    </div>
    <div class="key-reveal">
      <code id="key-created-value"></code>
      <button class="icon-btn" id="key-created-copy" title="Copy key">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      </button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" id="key-created-sharex">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download .sxcu
      </button>
      <button class="btn btn-secondary" id="key-created-done">Done</button>
    </div>
  </div>
</div>

<!-- ShareX Config Modal -->
<div class="modal-overlay" id="sharex-modal" style="display:none">
  <div class="modal" style="max-width:480px">
    <button class="modal-close" id="sharex-modal-close">&times;</button>
    <h2 class="modal-title">ShareX Configuration</h2>
    <p class="modal-desc" id="sharex-modal-label"></p>
    <div class="sxcu-preview">
      <pre id="sharex-preview"></pre>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" id="sharex-download">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download .sxcu
      </button>
      <button class="btn btn-secondary" id="sharex-copy-json">Copy JSON</button>
      <button class="btn btn-secondary" id="sharex-modal-cancel">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">Copied!</div>

<script src="/dashboard.js"></script>
</body>
</html>
